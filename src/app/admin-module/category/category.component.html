<div class="admin-container">
  <div class="category-header">
    <h1>Categories</h1>
    <button class="add-btn" (click)="openAddModal()">
      <i class="fa fa-plus"></i> Add Category
    </button>
  </div>

  <div class="category-grid">
    <div class="category-card" *ngFor="let cat of categories">
      <img [src]="'http://localhost:8090/images/' + cat.imageUrl" class="cat-img" />
      <div class="cat-info">
        <h3>{{ cat.name }}</h3>
        <p>{{ cat.description }}</p>
        <div class="actions">
          <button class="edit-icon" (click)="openEditModal(cat)"><i class="fa fa-edit"></i></button>
          <button class="delete-icon" (click)="confirmDelete(cat.categoryId)">
            <i class="fa fa-trash"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" *ngIf="showFormModal">
    <div class="modal-content">
      <h2>{{ isEditMode ? 'Update' : 'Add' }} Category</h2>
      <input type="text" [(ngModel)]="categoryForm.name" placeholder="Name" />
      <textarea [(ngModel)]="categoryForm.description" placeholder="Description"></textarea>

      <div class="file-upload">
        <input type="file" (change)="onFileSelected($event)" accept="image/*" />
        <img *ngIf="imagePreview" [src]="imagePreview" class="preview-img" />
      </div>

      <div class="modal-btns">
        <button class="cancel-btn" (click)="closeModals()">Cancel</button>
        <button class="save-btn" (click)="saveCategory()">
          {{ isEditMode ? 'Update' : 'Save' }}
        </button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" *ngIf="showDeleteModal">
    <div class="modal-content delete-confirm">
      <h3>Confirm Delete</h3>
      <p>Are you sure you want to delete this category?</p>
      <div class="modal-btns">
        <button class="cancel-btn" (click)="closeModals()">Cancel</button>
        <button class="save-btn danger" (click)="executeDelete()">OK</button>
      </div>
    </div>
  </div>
</div>
