<div class="admin-container">
  <div class="category-header">
    <div class="header-left">
      <h2>Products</h2>
      <select
        [(ngModel)]="selectedCategoryId"
        (ngModelChange)="onCategoryChange()"
        class="cat-select"
      >
        <option *ngFor="let cat of categories" [ngValue]="cat.categoryId">
          {{ cat.name }}
        </option>
      </select>
    </div>

    <button class="add-btn" (click)="openModal()"><i class="fa fa-plus"></i> Add Product</button>
  </div>

  <div class="table-card">
    <table class="styled-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Image</th>
          <th>Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let prod of products">
          <td>{{ prod.productId }}</td>
          <td>
            <img
              [src]="'http://localhost:8090/images/' + prod.imageUrl"
              class="table-img"
              alt="product"
            />
          </td>
          <td>{{ prod.name }}</td>
          <td>
            <button class="edit-icon" (click)="editProduct(prod)">
              <i class="fa fa-edit"></i>
            </button>
            <button class="delete-icon" (click)="deleteProduct(prod.productId)">
              <i class="fa fa-trash"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="modal-overlay" *ngIf="showModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>{{ isEditMode ? 'Update Product' : 'Add New Product' }}</h3>
      </div>

      <div class="form-inputs">
        <div class="input-group">
          <label>Select Category</label>
          <select [(ngModel)]="productForm.categoryId" class="modal-select">
            <option [ngValue]="null" disabled>-- Choose Category --</option>
            <option *ngFor="let cat of categories" [ngValue]="cat.categoryId">
              {{ cat.name }}
            </option>
          </select>
        </div>

        <input
          type="text"
          [(ngModel)]="productForm.productId"
          placeholder="Product ID"
          [disabled]="isEditMode"
        />
        <input type="text" [(ngModel)]="productForm.name" placeholder="Product Name" />
        <textarea
          [(ngModel)]="productForm.description"
          placeholder="Description"
          rows="3"
        ></textarea>

        <div class="file-input-group">
          <label>Product Image</label>
          <input type="file" (change)="onFileSelected($event)" />
        </div>
      </div>

      <div class="modal-btns">
        <button class="cancel-btn" (click)="closeModal()">Cancel</button>
        <button class="save-btn" (click)="onSubmit()">
          {{ isEditMode ? 'Update' : 'Save' }}
        </button>
      </div>
    </div>
  </div>
</div>
