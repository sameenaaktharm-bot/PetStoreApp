<div class="auth-container">
  <div class="auth-card">
    <header class="list-header">
      <h2>Login</h2>
    </header>
   
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
     
      <div class="form-group">
        <label>Email</label>
        <input
          type="text"
          formControlName="username"
          placeholder="Enter your registered email">
        <small class="error-text" *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid">
          Email is invalid.
        </small>
      </div>
 
      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          formControlName="password"
          placeholder="Enter your password">
        <small class="error-text" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          Password must be at least 6 characters.
        </small>
      </div>
 
      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid">
        Login
      </button>
 
    </form>
 
    <div class="auth-footer">
      <p>New user? <a routerLink="/register">Register here</a></p>
    </div>
  </div>
</div>
