<div class="profile-container">
  <header class="list-header">
    <h2>User Profile</h2>
    <p class="subtitle">Manage your account details and view recent activity.</p>
  </header>

  <div class="profile-grid">
    
    <div class="profile-card">
      <h3 class="section-title">Account Details</h3>
      <form [formGroup]="profileForm" (ngSubmit)="onUpdateProfile()">
        <div class="form-row">
          <div class="form-group">
            <label>User Name</label>
            <input type="text" formControlName="userName">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" formControlName="email">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="text" formControlName="phone">
          </div>
        </div>

        <div class="form-group">
          <label>Address</label>
          <input type="text" formControlName="address">
        </div>

        <div class="form-row">
          <div class="form-group"><label>City</label><input type="text" formControlName="city"></div>
          <div class="form-group"><label>State</label><input type="text" formControlName="state"></div>
        </div>

        <div class="form-row">
          <div class="form-group"><label>Zip Code</label><input type="text" formControlName="zip"></div>
          <div class="form-group"><label>Country</label><input type="text" formControlName="country"></div>
        </div>

        <button type="submit" class="btn-primary" [disabled]="profileForm.invalid">
          Save Account Information
        </button>
      </form>
    </div>

    <div class="profile-sidebar">
      
      <div class="profile-card action-card">
        <h3 class="section-title">Orders & Activity</h3>
        <p class="card-desc">Looking for your past purchases? Check the status of your current shipments and order history here.</p>
        
        <button class="btn-nav-action" routerLink="/profile/myOrders">
          <i class="fa-solid fa-clock-rotate-left"></i>
          View Full Order History
        </button>
      </div>

      <div class="profile-card action-card">
        <h3 class="section-title">Account Actions</h3>
        <ul class="action-list">
          <li>
            <button class="action-link" (click)="onLogout()">
              <i class="fa-solid fa-right-from-bracket"></i>
              Sign Out of Account
            </button>
          </li>
        </ul>
      </div>

    </div>

  </div>
</div>
