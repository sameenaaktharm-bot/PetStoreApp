
<div class="auth-container">
  <div class="auth-card">
    <header class="list-header">
      <h2>Checkout Details</h2>
    </header>
 
    <form [formGroup]="orderForm" (ngSubmit)="onContinue()">
     
      <!-- Payment Details -->
      <div class="form-section">
        <h3>Payment Details</h3>
        <div class="form-group">
          <label>Card Type *</label>
          <select formControlName="cardType" class="card-type">
            <option value="Visa">Visa</option>
            <option value="MasterCard">MasterCard</option>
            <option value="American Express">American Express</option>
          </select>
        </div>
 
        <div class="form-row">
          <div class="form-group">
            <label>Card Number *</label>
            <input type="password" formControlName="cardNumber" placeholder="**** **** **** ****">
            <small class="error-text" *ngIf="orderForm.get('cardNumber')?.touched && orderForm.get('cardNumber')?.invalid">
              Enter valid 16-digit card number.
            </small>
          </div>
          <div class="form-group">
            <label>Expiry Date (MM/YYYY) *</label>
            <input type="text" formControlName="expiryDate" placeholder="12/2026">
          </div>
        </div>
      </div>
 
      <!-- Billing & Contact -->
      <div class="form-section">
        <h3>Billing & Contact</h3>
       
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" formControlName="fullName" placeholder="Full Name">
        </div>
 
        <div class="form-group">
          <label>Mobile Number *</label>
          <input type="tel" formControlName="mobile" placeholder="Mobile Number">
          <small class="error-text" *ngIf="orderForm.get('mobile')?.touched && orderForm.get('mobile')?.invalid">
            Enter a valid mobile number.
          </small>
        </div>
 
        <div class="form-group">
          <label>Address *</label>
          <input type="text" formControlName="address" placeholder="Full Street Address">
        </div>
       
        <div class="form-row">
          <div class="form-group">
            <label>City *</label>
            <input type="text" formControlName="city">
          </div>
          <div class="form-group">
            <label>State *</label>
            <input type="text" formControlName="state">
          </div>
        </div>
 
        <div class="form-row">
          <div class="form-group">
            <label>Zip *</label>
            <input type="text" formControlName="zip">
          </div>
          <div class="form-group">
            <label>Country *</label>
            <input type="text" formControlName="country">
          </div>
        </div>
      </div>
 
      <button type="submit" class="btn-primary" [disabled]="orderForm.invalid && orderForm.touched">
        Continue
      </button>
    </form>
  </div>
</div>
