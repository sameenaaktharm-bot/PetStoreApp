<div class="auth-container">
  <div class="auth-card">
    <header class="list-header">
      <h2>Create Account</h2>
    </header>
 
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
     
      <div class="form-section">
        <h3>User Credentials</h3>
        <div class="form-group">
          <label>User Name</label>
          <input type="text" formControlName="userName" placeholder="Enter username">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" formControlName="email" placeholder="email@example.com">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Password</label>
            <input type="password" formControlName="password" placeholder="Min. 6 chars">
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" formControlName="repeatPassword">
          </div>
        </div>
      </div>
 
      <div class="form-section">
        <h3>Contact & Location</h3>
        <div class="form-row">
            <div class="form-group">
              <label>Phone Number</label>
              <input type="text" formControlName="phNo" placeholder="Phone number">
            </div>
            <div></div> 
          </div>
          
        <div class="form-group">
          <label>Address</label>
          <input type="text" formControlName="address" placeholder="Enter your address">
        </div>
       
        <div class="form-row">
          <div class="form-group"><label>City</label><input type="text" formControlName="city"></div>
          <div class="form-group"><label>State</label><input type="text" formControlName="state"></div>
        </div>
       
        <div class="form-row">
          <div class="form-group"><label>Pincode</label><input type="text" formControlName="pincode"></div>
          <div class="form-group"><label>Country</label><input type="text" formControlName="country"></div>
        </div>
      </div>
 
      <button type="submit" class="btn-primary" [disabled]="registerForm.invalid">
        Register Account
      </button>
 
      <div class="auth-footer">
        Already have an account? <a routerLink="/login">Login here</a>
      </div>
    </form>
  </div>
</div>
