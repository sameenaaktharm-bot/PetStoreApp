<div class="detail-page-wrapper">
  @if (item()) {
    <nav class="breadcrumb-nav">
      <button class="btn-back" [routerLink]="['/category', categoryId, productId]">
        ← Back to Varieties
      </button>
    </nav>

    <div class="detail-card">
      <div class="image-section">
        <div class="image-box">
          <img 
            [src]="item().imageUrl ? imageBaseUrl + item().imageUrl : 'https://via.placeholder.com/300'" 
            [alt]="item().name">
        </div>
      </div>

      <div class="info-section">
        <span class="category-tag">{{product().category.name}}</span>
        <h1 class="item-title">{{ item().name }}</h1>
        <p class="item-sku">Item ID: <strong>{{ item().variantId }}</strong></p>
        
        <div class="price-block">
          <span class="price-label">Price:</span>
          <span class="price-amount">{{ item().price | currency:'INR'}}</span>
        </div>

        <div class="purchase-actions">
          <div class="quantity-selector">
            <button (click)="decreaseQuantity()" [disabled]="item().stockQuantity <= 0">-</button>
            <input type="text" [value]="item().stockQuantity > 0 ? quantity() : 0" readonly>
            <button (click)="increaseQuantity()" [disabled]="item().stockQuantity <= 0">+</button>
          </div>
          
          <button 
            class="btn-add-to-cart" 
            (click)="addToCart()" 
            [disabled]="item().stockQuantity <= 0">
            
            @if (item().stockQuantity > 0) {
              <span><i class="fa-solid fa-cart-shopping"></i> Add to Cart</span>
            } @else {
              <span><i class="fa-solid fa-ban"></i> Out of Stock</span>
            }
          </button>
        </div>
        
        <div class="description-block">
          <h3>About this pet</h3>
          <p>{{ item().description || 'A premium selection from our catalog.' }}</p>
        </div>
      </div>
    </div>
  } @else {
    <div class="error-state">
      <h2>Loading item details...</h2>
    </div>
  }
</div>
